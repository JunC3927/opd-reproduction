cl_sft:
    stages:
        - geometry3k_cj

data:
    template: qwen3_vl
    max_prompt_length: 1024
    filter_overlong_prompts: true
    preprocessing_batch_size: 1000
    preprocessing_num_workers: 0

loader:
    # Replay uses one VERL trace file as one optimizer update.
    per_device_train_batch_size: 1
    num_workers: 0
    pin_memory: false
    drop_last: false
    persistent_workers: false
    prefetch_factor: null
    shuffle: false

model:
    model_name_or_path: /work/03/gw42/j40004/models/Qwen3-VL-2B-Instruct
    local_files_only: true
    torch_dtype: float32
    gradient_checkpointing: false

    image_min_pixels: 1024
    image_max_pixels: 262144

optimizer:
    learning_rate: 1.0e-6
    weight_decay: 0
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    lr_scheduler_type: none
    warmup_ratio: 0.0
    warmup_steps: null

method:
    name: opd
    rollout_backend: hf

    opd_alpha: 1.0
    opd_temperature: 1.0
    opd_loss_type: forward_kl_topk
    opd_topk: 32
    opd_topk_renorm: true
    opd_log_prob_min_clamp: -10.0
    opd_loss_max_clamp: 10.0
    opd_sft_coef: 0.0

tuning:
    lora:
        enable: false
        r: 128
        alpha: 256
        dropout: 0.05
        bias: "none"
        task_type: CAUSAL_LM
        target_modules: all

    freeze_vision_tower: false
    freeze_multi_modal_projector: false
    prepare_model_for_kbit_training: false

trainer:
    save_dir: experiments/qwen3_vl/layerA_replay_2b_fp32student_work
    run_name: qwen3_vl_layerA_replay_2b_fp32student_work
    swanlab_project: verl_distill_geo3k
    swanlab_workspace: null
    swanlab_mode: null

    tf32: true
    export_hf_model_at_end: true
