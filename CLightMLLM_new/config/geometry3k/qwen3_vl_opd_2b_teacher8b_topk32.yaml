cl_sft:
    stages:
        - geometry3k_cj

data:
    template: qwen3_vl
    max_prompt_length: 1024
    filter_overlong_prompts: true
    preprocessing_batch_size: 1000
    preprocessing_num_workers: 16

loader:
    # OPD + teacher 8B + 全参微调，显存压力很大，建议先用 1
    per_device_train_batch_size: 1

model:
    # student: Qwen3-VL-2B-Instruct
    model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-2B-Instruct
    local_files_only: true
    torch_dtype: bfloat16

    image_min_pixels: 1024
    image_max_pixels: 262144

optimizer:
    learning_rate: 2.0e-5
    weight_decay: 0
    warmup_ratio: 0.03
    warmup_steps: null

method:
    name: opd

    rollout_backend: hf

    # teacher: Qwen3-VL-8B-Instruct
    opd_teacher_model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-8B-Instruct
    opd_teacher_backend: hf

    # loss: forward_kl_topk
    opd_alpha: 1.0
    opd_temperature: 1.0
    opd_loss_type: forward_kl_topk
    opd_topk: 32

    # 不加 SFT loss
    opd_sft_coef: 0.0

    # rollout 设置
    rollout_num_generations: 1
    rollout_temperature: 1.0
    rollout_top_p: 1.0
    rollout_max_new_tokens: 512

tuning:
    # 全参数微调，不用 LoRA
    lora:
        enable: false
        r: 128
        alpha: 256
        dropout: 0.05
        bias: "none"
        task_type: CAUSAL_LM
        target_modules: all

    # 对齐 verl 的全参微调，这里不要冻结
    freeze_vision_tower: false
    freeze_multi_modal_projector: false

    prepare_model_for_kbit_training: false

trainer:
    save_dir: experiments/qwen3_vl/opd_geometry3k_2b_teacher8b_full_topk32
    run_name: qwen3_vl_opd_geometry3k_2b_teacher8b_full_topk32
    wandb_project: CL-debug

    tf32: true

    export_hf_model_at_end: true
    merge_lora_before_export: false

    enable_checkpointing: true

    accelerator: auto
    strategy: auto
    devices: auto

    precision: bf16-mixed

    max_epochs: 3
    max_steps: -1

    # 如果 4 卡训练：1 × 4 × 6 = 24
    accumulate_grad_batches: 6

    gradient_clip_val: 1.0
