cl_sft:
    stages:
        - geometry3k_cj

data:
    template: qwen3_vl
    max_prompt_length: 1024
    filter_overlong_prompts: true
    max_samples: 8
    preprocessing_batch_size: 4
    preprocessing_num_workers: 1
    log_first_sample: false

loader:
    per_device_train_batch_size: 1
    num_workers: 0
    pin_memory: false
    drop_last: false
    persistent_workers: false
    prefetch_factor: null
    shuffle: false

model:
    model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-2B-Instruct
    local_files_only: true
    torch_dtype: bfloat16

    image_min_pixels: 1024
    image_max_pixels: 262144

optimizer:
    learning_rate: 2.0e-5
    weight_decay: 0
    warmup_ratio: 0.03
    warmup_steps: null

method:
    name: opd

    # Student rollout vLLM.
    # Launch with CUDA_VISIBLE_DEVICES=<student_vllm_gpu>,<teacher_vllm_gpu>,<train_gpu>.
    rollout_backend: vllm
    rollout_vllm_device: cuda:0
    rollout_vllm_visible_devices: null
    rollout_vllm_tensor_parallel_size: 1
    rollout_vllm_gpu_memory_utilization: 0.35
    rollout_vllm_max_model_len: 1536
    rollout_vllm_enforce_eager: false
    rollout_vllm_sync_after_optimizer_step: true

    # Teacher scoring vLLM.
    opd_teacher_model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-8B-Instruct
    opd_teacher_backend: vllm
    opd_vllm_device: cuda:1
    opd_vllm_visible_devices: null
    opd_vllm_tensor_parallel_size: 1
    opd_vllm_gpu_memory_utilization: 0.45
    opd_vllm_max_model_len: 1536
    opd_vllm_max_logprobs: 32
    opd_vllm_enforce_eager: false

    opd_alpha: 1.0
    opd_temperature: 1.0
    opd_loss_type: forward_kl_topk
    opd_topk: 32
    opd_log_prob_min_clamp: -10.0
    opd_loss_max_clamp: 10.0
    opd_sft_coef: 0.0

    rollout_num_generations: 1
    rollout_do_sample: true
    rollout_temperature: 1.0
    rollout_top_p: 1.0
    rollout_top_k: null
    rollout_max_new_tokens: 8

tuning:
    lora:
        enable: false
        r: 128
        alpha: 256
        dropout: 0.05
        bias: "none"
        task_type: CAUSAL_LM
        target_modules: all

    freeze_vision_tower: false
    freeze_multi_modal_projector: false
    prepare_model_for_kbit_training: false

trainer:
    save_dir: experiments/qwen3_vl/opd_geometry3k_2b_teacher8b_topk32_student_vllm_sync_smoke
    run_name: qwen3_vl_opd_geometry3k_2b_teacher8b_topk32_student_vllm_sync_smoke
    wandb_project: verl_distill_geo3k

    tf32: true

    export_hf_model_at_end: false
    merge_lora_before_export: false

    enable_checkpointing: false

    accelerator: gpu
    strategy: auto
    devices: [2]

    precision: bf16-mixed

    max_epochs: 1
    max_steps: 2

    accumulate_grad_batches: 1

    gradient_clip_val: 1.0
    log_every_n_steps: 1
    num_sanity_val_steps: 0
    enable_progress_bar: true
