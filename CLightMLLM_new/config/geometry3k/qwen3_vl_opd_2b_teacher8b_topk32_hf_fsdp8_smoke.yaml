cl_sft:
    stages:
        - geometry3k_cj

data:
    template: qwen3_vl
    max_prompt_length: 1024
    filter_overlong_prompts: true
    # 48 samples / global batch 24 = 2 optimizer updates.
    max_samples: 48
    preprocessing_batch_size: 1000
    preprocessing_num_workers: 16

loader:
    # Effective train batch = 3 samples/GPU * 8 GPUs = 24.
    per_device_train_batch_size: 3
    num_workers: 4
    pin_memory: true
    drop_last: false
    persistent_workers: true
    prefetch_factor: 2
    shuffle: false

model:
    model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-2B-Instruct
    local_files_only: true
    # Closer to verl FSDP: load student/master weights in fp32, compute with bf16 mixed precision.
    torch_dtype: float32

    image_min_pixels: 1024
    image_max_pixels: 262144

optimizer:
    learning_rate: 1.0e-6
    weight_decay: 0
    lr_scheduler_type: none
    warmup_ratio: 0.0
    warmup_steps: null

method:
    name: opd

    # For the FSDP smoke, bypass HF generate because FSDP-wrapped generate is fragile.
    # This uses dataset/reference responses to test teacher scoring + student FSDP forward/backward.
    rollout_backend: reference

    opd_teacher_model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-8B-Instruct
    opd_teacher_backend: hf
    opd_teacher_device: auto
    # Keep the repeated HF teacher lighter while probing student FSDP.
    opd_teacher_torch_dtype: bfloat16

    opd_alpha: 1.0
    opd_temperature: 1.0
    opd_loss_type: forward_kl_topk
    opd_topk: 32
    opd_topk_renorm: true
    opd_log_prob_min_clamp: -10.0
    opd_loss_max_clamp: 10.0

    opd_sft_coef: 0.0

    rollout_num_generations: 1
    rollout_do_sample: true
    rollout_temperature: 1.0
    rollout_top_p: 1.0
    # FSDP smoke only checks generate/teacher/student/backward wiring.
    # Keep this short; full OPD configs should use 512.
    rollout_max_new_tokens: 32

tuning:
    lora:
        enable: false
        r: 128
        alpha: 256
        dropout: 0.05
        bias: "none"
        task_type: CAUSAL_LM
        target_modules: all

    freeze_vision_tower: false
    freeze_multi_modal_projector: false
    prepare_model_for_kbit_training: false

trainer:
    save_dir: experiments/qwen3_vl/opd_geometry3k_2b_teacher8b_topk32_hf_fsdp8_smoke
    run_name: qwen3_vl_opd_geometry3k_2b_teacher8b_topk32_hf_fsdp8_smoke
    wandb_project: verl_distill_geo3k

    tf32: true

    export_hf_model_at_end: false
    merge_lora_before_export: false

    enable_checkpointing: false

    accelerator: gpu
    strategy: fsdp_auto_wrap
    devices: 8
    fsdp_min_num_params: 100000000
    fsdp_cpu_offload: false
    # Lightning wraps the outer LightningModule, while OPD calls the inner HF model.
    # Keeping original parameter views avoids lm_head seeing a flat FSDP shard.
    fsdp_use_orig_params: true
    # Smoke-test workaround: keep output/input embeddings replicated so lm_head is
    # not exposed as a flattened shard during the inner HF forward.
    fsdp_ignore_lm_head: true
    fsdp_forward_prefetch: false

    precision: bf16-mixed

    max_epochs: 1
    max_steps: 2

    accumulate_grad_batches: 1

    # Lightning's FSDPPrecisionPlugin does not support norm clipping.
    # Keep clipping off for this smoke test; add an FSDP-aware clip path later if needed.
    gradient_clip_val: null
    log_every_n_steps: 1
    num_sanity_val_steps: 0
    enable_progress_bar: true
