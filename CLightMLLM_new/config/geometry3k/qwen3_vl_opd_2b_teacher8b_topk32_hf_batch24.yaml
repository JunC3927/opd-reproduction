cl_sft:
    stages:
        - geometry3k_cj

data:
    template: qwen3_vl
    max_prompt_length: 1024
    filter_overlong_prompts: true
    preprocessing_batch_size: 1000
    preprocessing_num_workers: 16

loader:
    # Effective train batch = per_device_train_batch_size * devices * accumulate_grad_batches.
    # This config uses 1 * 1 * 24 = 24, matching the verl TRAIN_BATCH_SIZE=24 update cadence.
    per_device_train_batch_size: 1
    num_workers: 4
    pin_memory: true
    drop_last: false
    persistent_workers: true
    prefetch_factor: 2
    shuffle: false

model:
    model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-2B-Instruct
    local_files_only: true
    torch_dtype: bfloat16

    image_min_pixels: 1024
    image_max_pixels: 262144

optimizer:
    learning_rate: 2.0e-5
    weight_decay: 0
    warmup_ratio: 0.03
    warmup_steps: null

method:
    name: opd

    # First stable reproduction stage: HF rollout + HF teacher forward.
    rollout_backend: hf

    opd_teacher_model_name_or_path: /raid/lwz/lzh/models/Qwen3-VL-8B-Instruct
    opd_teacher_backend: hf
    # Launch with CUDA_VISIBLE_DEVICES=0,1 so student trains on logical cuda:0
    # and the frozen teacher scores on logical cuda:1.
    opd_teacher_device: cuda:1

    opd_alpha: 1.0
    opd_temperature: 1.0
    opd_loss_type: forward_kl_topk
    opd_topk: 32
    opd_topk_renorm: true
    opd_log_prob_min_clamp: -10.0
    opd_loss_max_clamp: 10.0

    opd_sft_coef: 0.0

    rollout_num_generations: 1
    rollout_do_sample: true
    rollout_temperature: 1.0
    rollout_top_p: 1.0
    rollout_max_new_tokens: 512

tuning:
    lora:
        enable: false
        r: 128
        alpha: 256
        dropout: 0.05
        bias: "none"
        task_type: CAUSAL_LM
        target_modules: all

    freeze_vision_tower: false
    freeze_multi_modal_projector: false
    prepare_model_for_kbit_training: false

trainer:
    save_dir: experiments/qwen3_vl/opd_geometry3k_2b_teacher8b_topk32_hf_batch24
    run_name: qwen3_vl_opd_geometry3k_2b_teacher8b_topk32_hf_batch24
    wandb_project: verl_distill_geo3k

    tf32: true

    export_hf_model_at_end: true
    merge_lora_before_export: false

    enable_checkpointing: true

    accelerator: gpu
    strategy: auto
    devices: [0]

    precision: bf16-mixed

    max_epochs: 3
    max_steps: -1

    accumulate_grad_batches: 24

    gradient_clip_val: 1.0
    log_every_n_steps: 1
    num_sanity_val_steps: 0
    enable_progress_bar: true
