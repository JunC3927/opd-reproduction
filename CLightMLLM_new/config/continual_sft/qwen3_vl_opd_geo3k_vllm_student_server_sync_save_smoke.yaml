cl_sft:
    stages:
        - geo3k_j40004_verl_prompt

data:
    template: qwen3_vl
    dataset_config: config/dataset.json
    max_prompt_length: 1025
    cutoff_len: 1537
    filter_overlong_prompts: true
    preprocessing_batch_size: 1000
    preprocessing_num_workers: 1
    log_first_sample: true

loader:
    per_device_train_batch_size: 3
    num_workers: 0
    pin_memory: true
    drop_last: true
    shuffle: true

model:
    model_name_or_path: /work/03/gw42/j40004/models/Qwen3-VL-2B-Instruct
    local_files_only: true
    trust_remote_code: false
    torch_dtype: float32
    use_cache: true
    image_min_pixels: 1024
    image_max_pixels: 262144

optimizer:
    learning_rate: 1.0e-6
    weight_decay: 0.01
    warmup_ratio: 0.0
    warmup_steps: null
    lr_scheduler_type: none

method:
    name: opd
    opd_teacher_backend: vllm_server
    opd_teacher_server_host: 127.0.0.1
    opd_teacher_server_port: 29577
    opd_teacher_server_timeout: 3600.0
    opd_alpha: 1.0
    opd_temperature: 1.0
    opd_loss_type: forward_kl_topk
    opd_sft_coef: 0.0
    opd_topk: 32
    opd_log_prob_min_clamp: -10.0
    opd_loss_max_clamp: 10.0
    rollout_backend: vllm_student_server
    rollout_student_server_host: 127.0.0.1
    rollout_student_server_port: 29588
    rollout_student_server_timeout: 3600.0
    rollout_vllm_sync_after_optimizer_step: true
    rollout_student_server_sync_backend: remote_ipc_summon
    rollout_student_server_sync_bucket_size_mb: 2048
    rollout_student_server_sync_use_shm: false
    rollout_student_server_sync_device: null
    rollout_student_server_sync_dtype: none
    rollout_student_server_summon_rank0_only: true
    rollout_student_server_summon_offload_to_cpu: false
    rollout_student_server_verify_sync: false
    rollout_student_server_verify_name: null
    rollout_student_server_verify_numel: 65536
    rollout_student_server_verify_rtol: 5.0e-3
    rollout_student_server_verify_atol: 5.0e-3
    rollout_num_generations: 1
    rollout_do_sample: true
    rollout_temperature: 1.0
    rollout_top_p: 1.0
    rollout_top_k: null
    rollout_use_cache: true
    rollout_max_new_tokens: 64

tuning:
    lora:
        enable: false
    freeze_vision_tower: false
    freeze_multi_modal_projector: false
    prepare_model_for_kbit_training: false

trainer:
    save_dir: /work/03/gw42/j40004/cj/opd_dumps/layerC_lightning_opd_geo3k_vllm_student_server_sync_save_smoke
    run_name: layerC_lightning_opd_geo3k_vllm_student_server_sync_save_smoke
    swanlab_project: verl_distill_geo3k
    swanlab_workspace: null
    swanlab_mode: null
    wandb_project: null
    metrics_jsonl: metrics.jsonl
    tf32: true
    export_hf_model_at_end: true
    merge_lora_before_export: false
    enable_checkpointing: false
    accelerator: gpu
    strategy: fsdp_auto_wrap
    devices: 4
    precision: bf16-mixed
    fsdp_min_num_params: 10000000
    fsdp_param_dtype: float32
    fsdp_reduce_dtype: float32
    fsdp_buffer_dtype: float32
    fsdp_cpu_offload: false
    fsdp_use_orig_params: false
    fsdp_forward_prefetch: false
    fsdp_ignore_lm_head: false
    max_epochs: 1
    max_steps: 4
    accumulate_grad_batches: 1
    gradient_clip_val: 1.0
    log_every_n_steps: 1
    num_sanity_val_steps: 0
    enable_progress_bar: true
